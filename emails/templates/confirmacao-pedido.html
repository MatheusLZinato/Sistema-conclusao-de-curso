<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}
.box{max-width:560px;margin:40px auto;background:#fff;border-radius:12px;overflow:hidden}
.header{background:#D4AF37;padding:30px;text-align:center;color:#000}
.body{padding:30px;color:#333;line-height:1.7}
.total{font-size:1.4rem;font-weight:bold;color:#D4AF37;margin:20px 0}
.footer{background:#111;color:#aaa;text-align:center;padding:15px;font-size:.85rem}
</style></head><body><div class="box">
<div class="header"><h2>{{nome_loja}}</h2><p>Pedido Confirmado! 🎂</p></div>
<div class="body"><p>Olá, <strong>{{nome_cliente}}</strong>!</p>
<p>Seu pedido foi recebido com sucesso.</p>
<p><strong>Pedido:</strong> #{{pedido_id}}</p>
<p class="total">Total: {{total}}</p>
<p>Acompanhe o status pelo nosso site.</p></div>
<div class="footer">{{nome_loja}} — Feito com carinho 🍫</div></div></body></html>
