<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><style>
body{font-family:Arial,sans-serif;background:#f4f4f4}
.box{max-width:560px;margin:40px auto;background:#fff;border-radius:12px;overflow:hidden}
.header{background:#3182CE;padding:30px;text-align:center;color:#fff}
.body{padding:30px;color:#333;line-height:1.7}
.status{display:inline-block;background:#D4AF37;color:#000;padding:8px 20px;border-radius:20px;font-weight:bold}
.footer{background:#111;color:#aaa;text-align:center;padding:15px;font-size:.85rem}
</style></head><body><div class="box">
<div class="header"><h2>Atualização do Pedido</h2></div>
<div class="body"><p>Olá, <strong>{{nome_cliente}}</strong>!</p>
<p>Seu pedido <strong>#{{pedido_id}}</strong> foi atualizado:</p>
<p><span class="status">{{status}}</span></p></div>
<div class="footer">{{nome_loja}}</div></div></body></html>
